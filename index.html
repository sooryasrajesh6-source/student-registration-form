
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration Form</title>

  <style>
    body {
      background-color: white;
      color: blueviolet;
      
    }

    h1 {
      text-align: center;
      text-decoration: underline;
    }

    .form {
      background-color: blueviolet;
      color: white;
      width: 80%;
      margin: auto;
      padding: 25px;
      
    }

    label {
      display: inline-block;
      width: 150px;
      margin-bottom: 10px;
    }

    input, select, textarea {
      margin: 5px;
      padding: 5px;
    }

    textarea {
      width: 250px;
      height: 70px;
    }


    #button {
      width: 100px;
      padding: 8px;
      margin: 10px;
      background-color: white;
      color: blueviolet;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>STUDENT REGISTRATION FORM</h1>

  <div class="form">
    <form>

      <label>FIRST NAME</label>
      <input type="text" required><br>

      <label>SECOND NAME</label>
      <input type="text" required><br>

     <label for="dob">DATE OF BIRTH</label>

<select name="day" id="day">
    <option value="">Day</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="3">7</option>
    <option value="3">8</option>
    <option value="3">9</option>
    <option value="3">10</option>
    <option value="3">11</option>
    <option value="3">12</option>
    <option value="3">13</option>
    <option value="3">14</option>
    <option value="3">15</option>
    <option value="3">16</option>
    <option value="3">17</option>
    <option value="3">18</option>
    <option value="3">19</option>
    <option value="3">20</option>
    <option value="3">21</option>
    <option value="3">22</option>
    <option value="3">23</option>
    <option value="3">24</option>
    <option value="3">25</option>
    <option value="3">26</option>
    <option value="3">27</option>
    <option value="3">28</option>
    <option value="3">29</option>
    <option value="3">30</option>
    
    <option value="31">31</option>
</select>

<select name="month" id="month">
    <option value="">Month</option>
    <option value="January">January</option>
    <option value="February">February</option>
    <option value="March">March</option>
    <option value="April">April</option>
    <option value="May">May</option>
    <option value="June">June</option>
    <option value="July">July</option>
    <option value="August">August</option>
    <option value="September">September</option>
    <option value="October">October</option>
    <option value="November">November</option>
    <option value="December">December</option>
</select>

<select name="year" id="year">
    <option value="">Year</option>
    <option value="2000">2000</option>
    <option value="2001">2001</option>
    <option value="2002">2002</option>
    <option value="2003">2003</option>
    <option value="2004">2004</option>
    <option value="2005">2005</option>
    <option value="2006">2006</option>
    <option value="2007">2007</option>
    <option value="2008">2008</option>
    <option value="2009">2009</option>
    <option value="2010">2010</option>
    <option value="2011">2011</option>
    <option value="2012">2012</option>
</select><br><br>

      <label>E-MAIL ID</label>
      <input type="email" required><br>

      <label>MOBILE NUMBER</label>
      <input type="tel" maxlength="10"> (10 digits only)<br>

      <label>GENDER</label>
      Male <input type="radio" name="gender">
      Female <input type="radio" name="gender"><br>

      <label>ADDRESS</label>
      <textarea></textarea><br>

      <label>CITY</label>
      <input type="text"><br>

      <label>PINCODE</label>
      <input type="text" maxlength="6"><br>

      <label>STATE</label>
      <input type="text"><br>

      <label>COUNTRY</label>
      <input type="text"><br>

      <label>HOBBIES</label>
      Drawing <input type="checkbox">
      Singing <input type="checkbox">
      Dancing <input type="checkbox">
      Sketching <input type="checkbox"><br>

      <label>OTHERS</label>
      <input type="checkbox">
      <input type="text"><br>

      <label>QUALIFICATION</label>

      <table>
        <tr>
          <th>Sl.No.</th>
          <th>Examination</th>
          <th>Board</th>
          <th>Percentage</th>
          <th>Year of Passing</th>
        </tr>

        <tr>
          <td>1</td>
          <td>Class X</td>
          <td><input type="text"></td>
          <td><input type="text"></td>
          <td><input type="text"></td>
        </tr>

        <tr>
          <td>2</td>
          <td>Class XII</td>
          <td><input type="text"></td>
          <td><input type="text"></td>
          <td><input type="text"></td>
        </tr>

        <tr>
          <td>3</td>
          <td>Graduation</td>
          <td><input type="text"></td>
          <td><input type="text"></td>
          <td><input type="text"></td>
        </tr>

        <tr>
          <td>4</td>
          <td>Masters</td>
          <td><input type="text"></td>
          <td><input type="text"></td>
          <td><input type="text"></td>
        </tr>
      </table>

      <br>

      <label>COURSES APPLIED FOR</label>
      BCA <input type="radio" name="course">
      B.Com <input type="radio" name="course">
      B.Sc <input type="radio" name="course">
      B.A <input type="radio" name="course"><br><br>

      <center>
        <input type="submit" value="Submit" id="button">
        <input type="reset" value="Reset" id="button">
      </center>

    </form>
  </div>

</body>
</html>
